<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="450" fill="#f5f5f5" rx="10"/>
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Step 5: Enter the Key Sequence 1 2 3 4 5 6 7 8 * 0 #</text>
  <!-- Phone body -->
  <rect x="150" y="50" width="200" height="320" rx="12" fill="#2c2c2c" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Screen -->
  <rect x="175" y="70" width="150" height="80" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="250" y="105" text-anchor="middle" font-size="10" fill="#33cc33">Ready for reset...</text>
  <text x="250" y="120" text-anchor="middle" font-size="9" fill="#ffcc00">Enter key sequence now</text>
  <!-- Keypad with sequence numbers highlighted -->
  <!-- Row 1: 1 2 3 -->
  <rect x="180" y="175" width="35" height="25" rx="3" fill="#0088ff" stroke="#0066cc" stroke-width="2"/>
  <text x="197" y="192" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">1</text>
  <circle cx="197" cy="168" r="8" fill="#ff3300"/>
  <text x="197" y="171" text-anchor="middle" font-size="8" fill="#fff">1st</text>
  <rect x="225" y="175" width="35" height="25" rx="3" fill="#0088ff" stroke="#0066cc" stroke-width="2"/>
  <text x="242" y="192" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">2</text>
  <circle cx="242" cy="168" r="8" fill="#ff3300"/>
  <text x="242" y="171" text-anchor="middle" font-size="8" fill="#fff">2nd</text>
  <rect x="270" y="175" width="35" height="25" rx="3" fill="#0088ff" stroke="#0066cc" stroke-width="2"/>
  <text x="287" y="192" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">3</text>
  <circle cx="287" cy="168" r="8" fill="#ff3300"/>
  <text x="287" y="171" text-anchor="middle" font-size="8" fill="#fff">3rd</text>
  <!-- Row 2: 4 5 6 -->
  <rect x="180" y="210" width="35" height="25" rx="3" fill="#0088ff" stroke="#0066cc" stroke-width="2"/>
  <text x="197" y="227" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">4</text>
  <circle cx="197" cy="203" r="8" fill="#ff3300"/>
  <text x="197" y="206" text-anchor="middle" font-size="8" fill="#fff">4th</text>
  <rect x="225" y="210" width="35" height="25" rx="3" fill="#0088ff" stroke="#0066cc" stroke-width="2"/>
  <text x="242" y="227" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">5</text>
  <circle cx="242" cy="203" r="8" fill="#ff3300"/>
  <text x="242" y="206" text-anchor="middle" font-size="8" fill="#fff">5th</text>
  <rect x="270" y="210" width="35" height="25" rx="3" fill="#0088ff" stroke="#0066cc" stroke-width="2"/>
  <text x="287" y="227" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">6</text>
  <circle cx="287" cy="203" r="8" fill="#ff3300"/>
  <text x="287" y="206" text-anchor="middle" font-size="8" fill="#fff">6th</text>
  <!-- Row 3: 7 8 9 -->
  <rect x="180" y="245" width="35" height="25" rx="3" fill="#0088ff" stroke="#0066cc" stroke-width="2"/>
  <text x="197" y="262" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">7</text>
  <circle cx="197" cy="238" r="8" fill="#ff3300"/>
  <text x="197" y="241" text-anchor="middle" font-size="8" fill="#fff">7th</text>
  <rect x="225" y="245" width="35" height="25" rx="3" fill="#0088ff" stroke="#0066cc" stroke-width="2"/>
  <text x="242" y="262" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">8</text>
  <circle cx="242" cy="238" r="8" fill="#ff3300"/>
  <text x="242" y="241" text-anchor="middle" font-size="8" fill="#fff">8th</text>
  <rect x="270" y="245" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="287" y="262" text-anchor="middle" font-size="11" fill="#ddd">9</text>
  <!-- Row 4: * 0 # -->
  <rect x="180" y="280" width="35" height="25" rx="3" fill="#0088ff" stroke="#0066cc" stroke-width="2"/>
  <text x="197" y="297" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">*</text>
  <circle cx="197" cy="273" r="8" fill="#ff3300"/>
  <text x="197" y="276" text-anchor="middle" font-size="8" fill="#fff">9th</text>
  <rect x="225" y="280" width="35" height="25" rx="3" fill="#0088ff" stroke="#0066cc" stroke-width="2"/>
  <text x="242" y="297" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">0</text>
  <circle cx="242" cy="273" r="8" fill="#ff3300"/>
  <text x="242" y="276" text-anchor="middle" font-size="8" fill="#fff">10th</text>
  <rect x="270" y="280" width="35" height="25" rx="3" fill="#ff6600" stroke="#ff3300" stroke-width="3"/>
  <text x="287" y="297" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">#</text>
  <circle cx="287" cy="273" r="8" fill="#ff3300"/>
  <text x="287" y="276" text-anchor="middle" font-size="8" fill="#fff">11th</text>
  <!-- Sequence arrow flow -->
  <text x="250" y="325" text-anchor="middle" font-size="14" fill="#0066cc" font-weight="bold">Sequence: 1 2 3 4 5 6 7 8 * 0 #</text>
  <!-- Instruction text -->
  <text x="250" y="365" text-anchor="middle" font-size="13" fill="#cc0000" font-weight="bold">Press each key in order: 1 2 3 4 5 6 7 8 * 0 #</text>
  <text x="250" y="383" text-anchor="middle" font-size="11" fill="#666">Press each key once, in sequence, without pausing</text>
  <text x="250" y="400" text-anchor="middle" font-size="11" fill="#666">Note: Key 9 is NOT part of the sequence</text>
  <!-- Warning box -->
  <rect x="100" y="410" width="300" height="30" rx="5" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="250" y="430" text-anchor="middle" font-size="11" fill="#856404" font-weight="bold">Do NOT press 9. The sequence skips from 8 to *</text>
</svg>
