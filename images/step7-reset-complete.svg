<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="400" fill="#f5f5f5" rx="10"/>
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Step 7: Factory Reset Complete</text>
  <!-- Phone body -->
  <rect x="150" y="50" width="200" height="300" rx="12" fill="#2c2c2c" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Screen with Cisco logo / fresh boot -->
  <rect x="175" y="70" width="150" height="90" rx="4" fill="#000" stroke="#444" stroke-width="1"/>
  <text x="250" y="105" text-anchor="middle" font-size="16" fill="#00ccff" font-weight="bold">CISCO</text>
  <text x="250" y="125" text-anchor="middle" font-size="10" fill="#aaa">Initializing...</text>
  <text x="250" y="145" text-anchor="middle" font-size="9" fill="#33cc33">Factory Defaults Restored</text>
  <!-- Keypad -->
  <rect x="180" y="200" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="197" y="217" text-anchor="middle" font-size="11" fill="#ddd">1</text>
  <rect x="225" y="200" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="242" y="217" text-anchor="middle" font-size="11" fill="#ddd">2</text>
  <rect x="270" y="200" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="287" y="217" text-anchor="middle" font-size="11" fill="#ddd">3</text>
  <rect x="180" y="230" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="197" y="247" text-anchor="middle" font-size="11" fill="#ddd">4</text>
  <rect x="225" y="230" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="242" y="247" text-anchor="middle" font-size="11" fill="#ddd">5</text>
  <rect x="270" y="230" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="287" y="247" text-anchor="middle" font-size="11" fill="#ddd">6</text>
  <rect x="180" y="260" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="197" y="277" text-anchor="middle" font-size="11" fill="#ddd">7</text>
  <rect x="225" y="260" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="242" y="277" text-anchor="middle" font-size="11" fill="#ddd">8</text>
  <rect x="270" y="260" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="287" y="277" text-anchor="middle" font-size="11" fill="#ddd">9</text>
  <rect x="180" y="290" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="197" y="307" text-anchor="middle" font-size="11" fill="#ddd">*</text>
  <rect x="225" y="290" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="242" y="307" text-anchor="middle" font-size="11" fill="#ddd">0</text>
  <rect x="270" y="290" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="287" y="307" text-anchor="middle" font-size="11" fill="#ddd">#</text>
  <!-- Success checkmark -->
  <circle cx="420" cy="100" r="30" fill="#33cc33" opacity="0.15"/>
  <circle cx="420" cy="100" r="22" fill="#33cc33"/>
  <polyline points="408,100 416,110 434,90" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="420" y="140" text-anchor="middle" font-size="11" fill="#33cc33" font-weight="bold">SUCCESS!</text>
  <!-- Instruction text -->
  <text x="250" y="370" text-anchor="middle" font-size="13" fill="#009900" font-weight="bold">Factory reset is complete!</text>
  <text x="250" y="388" text-anchor="middle" font-size="11" fill="#666">The phone will reboot with factory default settings</text>
</svg>
