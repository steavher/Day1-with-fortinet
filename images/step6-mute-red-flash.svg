<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; }
      @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.2} }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="400" fill="#f5f5f5" rx="10"/>
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Step 6: Mute Button Flashes RED</text>
  <!-- Phone body -->
  <rect x="150" y="50" width="200" height="300" rx="12" fill="#2c2c2c" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Screen -->
  <rect x="175" y="70" width="150" height="90" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="250" y="110" text-anchor="middle" font-size="11" fill="#ffcc00">Factory Reset</text>
  <text x="250" y="128" text-anchor="middle" font-size="11" fill="#ffcc00">In Progress...</text>
  <!-- Mute button with RED flash effect -->
  <circle cx="250" cy="180" r="18" fill="#ff0000" opacity="0.3"/>
  <circle cx="250" cy="180" r="14" fill="#ff0000" opacity="0.5"/>
  <rect x="238" y="170" width="24" height="18" rx="4" fill="#333" stroke="#ff0000" stroke-width="3"/>
  <!-- Microphone icon with line through it (mute) -->
  <ellipse cx="250" cy="176" rx="3" ry="5" fill="none" stroke="#ff0000" stroke-width="1.5"/>
  <line x1="250" y1="181" x2="250" y2="184" stroke="#ff0000" stroke-width="1.5"/>
  <line x1="244" y1="173" x2="256" y2="183" stroke="#ff0000" stroke-width="1.5"/>
  <!-- RED LED indicator -->
  <circle cx="250" cy="197" r="5" fill="#ff0000"/>
  <circle cx="250" cy="197" r="8" fill="none" stroke="#ff0000" stroke-width="1" opacity="0.5"/>
  <circle cx="250" cy="197" r="11" fill="none" stroke="#ff0000" stroke-width="1" opacity="0.3"/>
  <!-- Flash lines radiating -->
  <line x1="250" y1="160" x2="250" y2="152" stroke="#ff3300" stroke-width="2"/>
  <line x1="265" y1="165" x2="271" y2="158" stroke="#ff3300" stroke-width="2"/>
  <line x1="235" y1="165" x2="229" y2="158" stroke="#ff3300" stroke-width="2"/>
  <line x1="270" y1="180" x2="278" y2="180" stroke="#ff3300" stroke-width="2"/>
  <line x1="230" y1="180" x2="222" y2="180" stroke="#ff3300" stroke-width="2"/>
  <!-- Label pointing to mute -->
  <text x="380" y="175" font-size="12" fill="#ff0000" font-weight="bold">MUTE button</text>
  <text x="380" y="190" font-size="12" fill="#ff0000" font-weight="bold">flashing RED</text>
  <line x1="375" y1="180" x2="268" y2="180" stroke="#ff0000" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Keypad (abbreviated) -->
  <rect x="180" y="220" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="197" y="237" text-anchor="middle" font-size="11" fill="#ddd">1</text>
  <rect x="225" y="220" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="242" y="237" text-anchor="middle" font-size="11" fill="#ddd">2</text>
  <rect x="270" y="220" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="287" y="237" text-anchor="middle" font-size="11" fill="#ddd">3</text>
  <rect x="180" y="250" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="197" y="267" text-anchor="middle" font-size="11" fill="#ddd">4</text>
  <rect x="225" y="250" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="242" y="267" text-anchor="middle" font-size="11" fill="#ddd">5</text>
  <rect x="270" y="250" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="287" y="267" text-anchor="middle" font-size="11" fill="#ddd">6</text>
  <rect x="180" y="280" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="197" y="297" text-anchor="middle" font-size="11" fill="#ddd">7</text>
  <rect x="225" y="280" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="242" y="297" text-anchor="middle" font-size="11" fill="#ddd">8</text>
  <rect x="270" y="280" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="287" y="297" text-anchor="middle" font-size="11" fill="#ddd">9</text>
  <rect x="180" y="310" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="197" y="327" text-anchor="middle" font-size="11" fill="#ddd">*</text>
  <rect x="225" y="310" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="242" y="327" text-anchor="middle" font-size="11" fill="#ddd">0</text>
  <rect x="270" y="310" width="35" height="25" rx="3" fill="#444" stroke="#555" stroke-width="1"/>
  <text x="287" y="327" text-anchor="middle" font-size="11" fill="#ddd">#</text>
  <!-- Instruction text -->
  <text x="250" y="370" text-anchor="middle" font-size="13" fill="#cc0000" font-weight="bold">Mute (microphone) button flashes RED</text>
  <text x="250" y="388" text-anchor="middle" font-size="11" fill="#666">This confirms the factory reset has been triggered</text>
</svg>
